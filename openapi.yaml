openapi: 3.1.0
info:
  title: Prohori API
  version: 1.0.0
  description: |
    Contract freeze 1.0.0 (Step 10): synthetic decision-support API for provider
    liquidity, unusual activity review, data quality, and case coordination. It never
    performs financial actions. All non-health requests require a verified Supabase JWT;
    scope is derived from memberships, outlet assignments, and alert routing. Query
    filters only narrow that server-enforced scope. Mutating workflow routes require an
    `Idempotency-Key`; read routes never require one.
  license:
    name: UNLICENSED
servers:
  - url: http://localhost:3000/api/v1
paths:
  /health/live:
    get:
      operationId: getLiveHealth
      summary: Check whether API process is live
      security: []
      responses:
        '200':
          description: API is live
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveHealthResponse'
              example:
                service: prohori-api
                status: ok
        '500':
          $ref: '#/components/responses/StandardError'
  /me:
    get:
      operationId: getCurrentUser
      summary: Get authenticated profile and authorization scope
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated profile. Implemented in Step 3.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/StandardError'
        '503':
          $ref: '#/components/responses/StandardError'
  /providers:
    get:
      operationId: listProviders
      summary: List synthetic providers available in caller scope
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Providers in caller scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Provider'
        '401':
          $ref: '#/components/responses/StandardError'
        '503':
          $ref: '#/components/responses/StandardError'
  /areas:
    get:
      operationId: listAreas
      summary: List synthetic areas available in caller scope
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Areas in caller scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Area'
        '401':
          $ref: '#/components/responses/StandardError'
        '503':
          $ref: '#/components/responses/StandardError'
  /outlets:
    get:
      operationId: listOutlets
      summary: List synthetic outlets available in caller scope
      security:
        - bearerAuth: []
      parameters:
        - name: areaCode
          in: query
          required: false
          schema:
            type: string
            maxLength: 50
          example: DHAKA_NORTH
      responses:
        '200':
          description: Outlets in caller scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Outlet'
        '401':
          $ref: '#/components/responses/StandardError'
        '503':
          $ref: '#/components/responses/StandardError'
  /ingestion/providers/{provider}/batches:
    post:
      operationId: ingestProviderBatch
      summary: Ingest a checksum-verified synthetic provider feed batch
      description: The `X-Provider-Ingest-Key` derives the provider scope and must match the path. Duplicate events are retained as feed-quality evidence and are never applied twice.
      security:
        - providerIngestKey: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ProviderCode'
        - $ref: '#/components/parameters/ProviderIngestKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestionBatch'
            example:
              sequence: 1
              sourceAt: '2026-01-01T08:00:00.000Z'
              receivedAt: '2026-01-01T08:00:30.000Z'
              events: []
              snapshots: []
              checksum: 8f3f6d7407c38bfdfb9c0f2e0cfc6a6ab7fbc8246f4e6b7424f02014d0cbb714
      responses:
        '201':
          description: Receipt and data-quality result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionReceipt'
        '400':
          $ref: '#/components/responses/StandardError'
        '401':
          $ref: '#/components/responses/StandardError'
        '409':
          $ref: '#/components/responses/StandardError'
        '503':
          $ref: '#/components/responses/StandardError'
  /outlets/{id}/health:
    get:
      operationId: getOutletHealth
      summary: Get scoped outlet liquidity-health summary
      description: Produces and persists a deterministic forecast run. `modelConfidence` measures analytical history coverage independently from feed `dataQuality`.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/OutletId' }]
      responses:
        '200':
          description: Scoped outlet health
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutletHealth' }
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /outlets/{id}/balances:
    get:
      operationId: getOutletBalances
      summary: Get scoped, separate shared-cash and provider e-money positions
      description: Shared cash and provider e-money are separate resources and are never exposed as a combined actionable balance.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/OutletId' }]
      responses:
        '200':
          description: Authorized resource positions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutletBalances' }
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /outlets/{id}/forecasts:
    get:
      operationId: getOutletForecasts
      summary: Generate and persist a deterministic scoped liquidity forecast
      description: Forecasts 30, 60, 120, and 240-minute bounds for shared cash and each authorized provider e-money resource. With `unreliable` quality, exact ETAs are null; the analytical confidence remains available.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/OutletId' }]
      responses:
        '200':
          description: Persisted forecast run
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ForecastRun' }
              examples:
                normal:
                  value:
                    id: 70000000-0000-4000-8000-000000000001
                    outletId: 30000000-0000-4000-8000-000000000001
                    generatedAt: '2026-01-01T12:00:00.000Z'
                    dataQuality: healthy
                    modelConfidence: 0.625
                    limitingResource: { resource: provider_efloat, providerId: 10000000-0000-4000-8000-000000000001 }
                    resources: [{ resource: provider_efloat, providerId: 10000000-0000-4000-8000-000000000001, currentMinor: '300000', demandRateMinorPerMinute: 833.33, points: [{ horizonMinutes: 30, projectedLowMinor: '270000', projectedMidMinor: '275000', projectedHighMinor: '280000', reserveEtaMinutes: 240, likelyDepletionEtaMinutes: 360, riskBand: moderate }] }]
                unreliableData:
                  value:
                    id: 70000000-0000-4000-8000-000000000002
                    outletId: 30000000-0000-4000-8000-000000000001
                    generatedAt: '2026-01-01T12:00:00.000Z'
                    dataQuality: unreliable
                    modelConfidence: 0.625
                    limitingResource: { resource: provider_efloat, providerId: 10000000-0000-4000-8000-000000000001 }
                    resources: [{ resource: provider_efloat, providerId: 10000000-0000-4000-8000-000000000001, currentMinor: '300000', demandRateMinorPerMinute: 833.33, points: [{ horizonMinutes: 30, projectedLowMinor: '270000', projectedMidMinor: '275000', projectedHighMinor: '280000', reserveEtaMinutes: null, likelyDepletionEtaMinutes: null, riskBand: moderate }] }]
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /outlets/{id}/anomalies:
    get:
      operationId: listOutletAnomalies
      summary: Generate and list deterministic unusual-activity review signals
      description: Signals compare an outlet/provider evidence window with stored baseline activity. The response uses review-only language and never asserts fraud or causation. It may include a persisted correlation to separately retained shared-cash liquidity pressure.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/OutletId' }]
      responses:
        '200':
          description: Authorized unusual-activity review signals
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AnomalySignal' }
              example:
                - id: 80000000-0000-4000-8000-000000000001
                  message: Unusual activity requires review.
                  detectorType: repeated_amount
                  detectorVersion: 1.0.0
                  observedValue: 4
                  baselineValue: 0
                  threshold: 3
                  score: 1
                  provider: { id: 10000000-0000-4000-8000-000000000002, code: PROVIDER_B, name: Provider B, status: ACTIVE }
                  sourceTransactionIds: [90000000-0000-4000-8000-000000000001]
                  evidenceWindow: { start: '2026-01-01T07:00:00.000Z', end: '2026-01-01T08:00:00.000Z' }
                  possibleBenignExplanation: A scheduled campaign or common denomination may produce repeated amounts; review the event context.
                  modelConfidence: 0.5
                  dataQuality: healthy
                  correlation: { score: 1, threshold: 0.75, context: Shared-cash liquidity pressure and unusual activity overlap in the same deterministic evidence window. This correlation does not establish causation. }
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /outlets/{id}/data-quality:
    get:
      operationId: getOutletDataQuality
      summary: List scoped active data-quality evidence for an outlet
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/OutletId' }]
      responses:
        '200':
          description: Derived quality and underlying active incidents
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutletDataQuality' }
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /outlets/{id}/transactions:
    get:
      operationId: listOutletTransactions
      summary: List provider-scoped outlet ledger events
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/OutletId'
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: cursor
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Authorized transaction page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionPage' }
        '400': { $ref: '#/components/responses/StandardError' }
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /simulation/reset:
    post:
      operationId: resetSimulation
      summary: Reset deterministic synthetic simulation state
      description: DEMO_ADMIN only. Restores seeded baseline balances and removes prior simulated feed receipts, events, snapshots, and quality incidents.
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Scenario state reset
        '403':
          $ref: '#/components/responses/StandardError'
  /simulation/start:
    post:
      operationId: startSimulation
      summary: Reset and start deterministic scenario A, B, C, or D
      description: DEMO_ADMIN only. Fixtures are submitted through the same ingestion validation and persistence path as provider batches.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulationCommand'
            example: { scenario: A }
      responses:
        '201':
          description: Scenario started
        '403':
          $ref: '#/components/responses/StandardError'
  /simulation/step:
    post:
      operationId: stepSimulation
      summary: Apply the next deterministic scenario batch
      description: DEMO_ADMIN only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulationCommand'
      responses:
        '201':
          description: Next scenario batch applied
        '403':
          $ref: '#/components/responses/StandardError'
  /alerts:
    get:
      operationId: listAlerts
      summary: List review-only alerts in the verified caller's route scope
      description: Provider alerts are visible only to routed provider members/assignments. Shared-cash alerts contain no competitor provider detail.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: active
          in: query
          schema: { type: boolean }
        - name: outletId
          in: query
          schema: { type: string, format: uuid }
        - name: type
          in: query
          schema: { $ref: '#/components/schemas/AlertType' }
      responses:
        '200':
          description: Scoped alert episodes
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Alert' } }
              example:
                - id: 90000000-0000-4000-8000-000000000001
                  outletId: 30000000-0000-4000-8000-000000000001
                  providerId: 10000000-0000-4000-8000-000000000001
                  resource: provider_efloat
                  type: provider_emoney_pressure
                  severity: high
                  status: open
                  active: true
                  episodeStartedAt: '2026-01-01T12:00:00.000Z'
                  lastObservedAt: '2026-01-01T12:00:00.000Z'
                  occurrenceCount: 1
                  message: { key: alerts.provider_emoney_pressure.review, params: { severity: high } }
                  evidence: { forecastRunId: 70000000-0000-4000-8000-000000000001 }
                  dataQuality: healthy
                  modelConfidence: 0.8
                  ownerUserId: null
                  acknowledgedAt: null
                  acknowledgedBy: null
        '401': { $ref: '#/components/responses/StandardError' }
  /alerts/{id}:
    get:
      operationId: getAlert
      summary: Get scoped alert evidence and localized message key
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/AlertId' }]
      responses:
        '200': { description: Scoped alert detail, content: { application/json: { schema: { $ref: '#/components/schemas/AlertDetail' } } } }
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeAlert
      summary: Acknowledge a scoped review alert
      description: Review workflow only; this never changes a balance, ledger, provider feed, or financial state.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/AlertId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      responses:
        '201': { description: Acknowledged alert, content: { application/json: { schema: { $ref: '#/components/schemas/Alert' } } } }
        '400': { $ref: '#/components/responses/StandardError' }
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /alerts/{id}/assign:
    post:
      operationId: assignAlert
      summary: Assign a scoped alert to a routed recipient
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/AlertId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AlertAssignment' }
            example: { assigneeUserId: 40000000-0000-4000-8000-000000000002 }
      responses:
        '201': { description: Assigned alert, content: { application/json: { schema: { $ref: '#/components/schemas/Alert' } } } }
        '400': { $ref: '#/components/responses/StandardError' }
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /alerts/{id}/create-case:
    post:
      operationId: createAlertCase
      summary: Create an idempotent, provider-scoped human-review case from an alert
      description: Creates a review-only case and immutable creation/audit events. Requires a workflow role; it never changes a balance, ledger, provider feed, or financial state.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/AlertId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      responses:
        '201': { description: Case created, content: { application/json: { schema: { $ref: '#/components/schemas/AlertCaseResponse' } } } }
        '400': { $ref: '#/components/responses/StandardError' }
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /cases:
    get:
      operationId: listCases
      summary: List provider-scoped review cases
      description: Caller scope is derived from verified memberships, assignments, and alert routes; query filters can only narrow results.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: state
          in: query
          schema: { $ref: '#/components/schemas/CaseState' }
        - name: outletId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Scoped cases, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Case' } } } } }
        '401': { $ref: '#/components/responses/StandardError' }
  /cases/{id}:
    get:
      operationId: getCase
      summary: Get one provider-scoped review case
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CaseId' }]
      responses:
        '200': { description: Scoped case, content: { application/json: { schema: { $ref: '#/components/schemas/Case' } } } }
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /cases/{id}/timeline:
    get:
      operationId: getCaseTimeline
      summary: Get immutable scoped case events, notes, and audit timeline
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CaseId' }]
      responses:
        '200': { description: Append-only case timeline, content: { application/json: { schema: { $ref: '#/components/schemas/CaseTimeline' } } } }
        '401': { $ref: '#/components/responses/StandardError' }
        '404': { $ref: '#/components/responses/StandardError' }
  /cases/{id}/acknowledge:
    post:
      operationId: acknowledgeCase
      summary: Move OPEN case to ACKNOWLEDGED
      description: 'Requires `version`, `Idempotency-Key`, a workflow role, and provider scope. Review-only: cannot mutate financial tables.'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CaseId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/VersionedCommand' }, example: { version: 1 } } } }
      responses: { '201': { description: Updated case, content: { application/json: { schema: { $ref: '#/components/schemas/Case' } } } }, '400': { $ref: '#/components/responses/StandardError' }, '401': { $ref: '#/components/responses/StandardError' }, '404': { $ref: '#/components/responses/StandardError' } }
  /cases/{id}/assign:
    post:
      operationId: assignCase
      summary: Assign or reassign a case to an active scoped assignee
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CaseId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CaseAssignment' }, example: { version: 1, assigneeUserId: 40000000-0000-4000-8000-000000000002 } } } }
      responses: { '201': { description: Updated case, content: { application/json: { schema: { $ref: '#/components/schemas/Case' } } } }, '400': { $ref: '#/components/responses/StandardError' }, '401': { $ref: '#/components/responses/StandardError' }, '404': { $ref: '#/components/responses/StandardError' } }
  /cases/{id}/notes:
    post:
      operationId: addCaseNote
      summary: Add an immutable scoped review note
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CaseId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CaseNoteCommand' }, example: { version: 2, body: Verification requested from the outlet. } } } }
      responses: { '201': { description: Updated case, content: { application/json: { schema: { $ref: '#/components/schemas/Case' } } } }, '400': { $ref: '#/components/responses/StandardError' }, '401': { $ref: '#/components/responses/StandardError' }, '404': { $ref: '#/components/responses/StandardError' } }
  /cases/{id}/request-verification:
    post:
      operationId: requestCaseVerification
      summary: Move ACKNOWLEDGED case to INVESTIGATING and record a review request
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CaseId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/SummaryCommand' } } } }
      responses: { '201': { description: Updated case }, '400': { $ref: '#/components/responses/StandardError' }, '401': { $ref: '#/components/responses/StandardError' }, '404': { $ref: '#/components/responses/StandardError' } }
  /cases/{id}/escalate:
    post:
      operationId: escalateCase
      summary: Move INVESTIGATING case to ESCALATED
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CaseId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/VersionedCommand' } } } }
      responses: { '201': { description: Updated case }, '400': { $ref: '#/components/responses/StandardError' }, '401': { $ref: '#/components/responses/StandardError' }, '404': { $ref: '#/components/responses/StandardError' } }
  /cases/{id}/disposition:
    post:
      operationId: recordCaseDisposition
      summary: Record a review disposition without changing financial state
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CaseId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DispositionCommand' } } } }
      responses: { '201': { description: Updated case }, '400': { $ref: '#/components/responses/StandardError' }, '401': { $ref: '#/components/responses/StandardError' }, '404': { $ref: '#/components/responses/StandardError' } }
  /cases/{id}/resolve:
    post:
      operationId: resolveCase
      summary: Resolve an INVESTIGATING or ESCALATED case with an allowlisted review code
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CaseId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ResolveCaseCommand' }, example: { version: 4, resolutionCode: VERIFIED_NORMAL_ACTIVITY, resolutionSummary: Review completed; no financial action was taken. } } } }
      responses: { '201': { description: Updated case }, '400': { $ref: '#/components/responses/StandardError' }, '401': { $ref: '#/components/responses/StandardError' }, '404': { $ref: '#/components/responses/StandardError' } }
  /cases/{id}/close:
    post:
      operationId: closeCase
      summary: Move RESOLVED case to CLOSED
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CaseId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/VersionedCommand' } } } }
      responses: { '201': { description: Updated case }, '400': { $ref: '#/components/responses/StandardError' }, '401': { $ref: '#/components/responses/StandardError' }, '404': { $ref: '#/components/responses/StandardError' } }
  /cases/{id}/reopen:
    post:
      operationId: reopenCase
      summary: Reopen a CLOSED case to OPEN, clearing its prior resolution
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CaseId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/VersionedCommand' } } } }
      responses: { '201': { description: Updated case }, '400': { $ref: '#/components/responses/StandardError' }, '401': { $ref: '#/components/responses/StandardError' }, '404': { $ref: '#/components/responses/StandardError' } }
  /feed-health:
    get:
      operationId: listFeedHealth
      summary: List provider feed freshness and derived data quality in caller scope
      description: Requires a verified JWT and provider membership. `providerId` and `outletId` are narrowing filters; outlet filtering derives quality only from incidents visible at that outlet. Cursor pagination is stable by receipt time and ID.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/PageCursor'
        - $ref: '#/components/parameters/ProviderFilter'
        - $ref: '#/components/parameters/OutletFilter'
      responses:
        '200':
          description: Scoped feed-health page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeedHealthPage' }
              example:
                items: [{ providerId: 10000000-0000-4000-8000-000000000001, sequence: '14', receivedAt: '2026-01-01T12:00:30.000Z', qualityStatus: degraded, dataQuality: degraded, activeIncidentCount: 1, latestIncidentAt: '2026-01-01T12:00:30.000Z' }]
                nextCursor: null
        '400': { $ref: '#/components/responses/StandardError' }
        '401': { $ref: '#/components/responses/StandardError' }
  /data-quality/incidents:
    get:
      operationId: listDataQualityIncidents
      summary: List scoped feed data-quality incidents
      description: Requires a verified JWT. Filters and cursor pagination only narrow RLS-authorized incidents; cross-provider IDs return no additional data.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/PageCursor'
        - $ref: '#/components/parameters/ProviderFilter'
        - $ref: '#/components/parameters/OutletFilter'
      responses:
        '200':
          description: Scoped data-quality incident page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataQualityIncidentPage' }
              example:
                items: [{ id: 50000000-0000-4000-8000-000000000001, providerId: 10000000-0000-4000-8000-000000000001, outletId: 30000000-0000-4000-8000-000000000001, category: FRESHNESS_LAG, details: { lagMinutes: 20 }, detectedAt: '2026-01-01T12:00:30.000Z', resolvedAt: null }]
                nextCursor: null
        '400': { $ref: '#/components/responses/StandardError' }
        '401': { $ref: '#/components/responses/StandardError' }
  /management/readiness:
    get:
      operationId: getManagementReadiness
      summary: Get fixed, redacted platform readiness aggregate
      description: Requires a verified JWT plus `PLATFORM_MANAGEMENT` or `DEMO_ADMIN` membership. Returns only aggregate counts and timestamps; it never exposes provider, outlet, transaction, balance, or incident details.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Redacted management aggregate
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ManagementReadiness' }
              example: { generatedAt: '2026-01-01T12:00:30.000Z', providersReporting: 3, providersDegraded: 1, providersUnreliable: 0, activeIncidentCount: 2, unresolvedOutletCount: 1, latestFeedReceivedAt: '2026-01-01T12:00:30.000Z' }
        '401': { $ref: '#/components/responses/StandardError' }
        '403': { $ref: '#/components/responses/StandardError' }
components:
  securitySchemes:
    providerIngestKey:
      type: apiKey
      in: header
      name: X-Provider-Ingest-Key
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PageLimit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    PageCursor:
      name: cursor
      in: query
      required: false
      schema: { type: string, format: uuid }
    ProviderFilter:
      name: providerId
      in: query
      required: false
      schema: { type: string, format: uuid }
      description: Narrowing filter only; it cannot expand verified provider scope.
    OutletFilter:
      name: outletId
      in: query
      required: false
      schema: { type: string, format: uuid }
      description: Narrowing filter only; it cannot expand verified outlet scope.
    CaseId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    AlertId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1, maxLength: 200 }
      description: Required replay-safe workflow mutation key.
    OutletId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProviderIngestKey:
      name: X-Provider-Ingest-Key
      in: header
      required: true
      schema:
        type: string
      description: Provider-scoped credential. Never send this from a browser client.
  headers:
    CorrelationId:
      description: Request correlation identifier. Client-supplied valid UUID values are echoed.
      schema:
        type: string
        format: uuid
  schemas:
    ProviderCode:
      type: string
      enum: [PROVIDER_A, PROVIDER_B, PROVIDER_C]
    IngestionEvent:
      type: object
      required: [amountMinor, eventId, eventVersion, idempotencyKey, lifecycle, occurredAt, outletCode, receivedAt, type]
      properties:
        amountMinor: { type: integer, minimum: 1, description: BDT integer minor units }
        eventId: { type: string }
        eventVersion: { type: integer, minimum: 1 }
        idempotencyKey: { type: string }
        lifecycle: { type: string, enum: [PENDING, SETTLED, FAILED, REVERSED] }
        occurredAt: { type: string, format: date-time }
        outletCode: { type: string }
        receivedAt: { type: string, format: date-time }
        type: { type: string, enum: [CASH_IN, CASH_OUT] }
    BalanceSnapshot:
      type: object
      required: [amountMinor, observedAt, outletCode, resource]
      properties:
        amountMinor: { type: integer, minimum: 0 }
        observedAt: { type: string, format: date-time }
        outletCode: { type: string }
        resource: { type: string, enum: [shared_cash, provider_efloat] }
    IngestionBatch:
      type: object
      required: [checksum, events, receivedAt, sequence, snapshots, sourceAt]
      properties:
        checksum: { type: string, pattern: '^[a-fA-F0-9]{64}$' }
        events: { type: array, maxItems: 500, items: { $ref: '#/components/schemas/IngestionEvent' } }
        receivedAt: { type: string, format: date-time }
        sequence: { type: integer, minimum: 1 }
        snapshots: { type: array, maxItems: 100, items: { $ref: '#/components/schemas/BalanceSnapshot' } }
        sourceAt: { type: string, format: date-time }
      description: Checksum is SHA-256 of the recursively key-sorted JSON payload excluding `checksum`.
    IngestionReceipt:
      type: object
      required: [acceptedEvents, batchId, duplicateEvents, provider, qualityStatus, rejectedEvents, sequence]
      properties:
        acceptedEvents: { type: integer }
        batchId: { type: string, format: uuid }
        duplicateEvents: { type: integer }
        provider: { $ref: '#/components/schemas/ProviderCode' }
        qualityStatus: { type: string, enum: [healthy, degraded] }
        rejectedEvents: { type: integer }
        sequence: { type: string }
    SimulationCommand:
      type: object
      required: [scenario]
      properties:
        scenario: { type: string, enum: [A, B, C, D] }
    LiveHealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
          const: prohori-api
        status:
          type: string
          const: ok
    Provider:
      type: object
      required: [id, code, name, status]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          enum: [PROVIDER_A, PROVIDER_B, PROVIDER_C]
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
    Area:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        parentId:
          type: [string, 'null']
          format: uuid
    Outlet:
      type: object
      required: [id, code, name, area, tier, timezone, status]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        area:
          $ref: '#/components/schemas/Area'
        tier:
          type: integer
          minimum: 1
          maximum: 5
        timezone:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
    CurrentUser:
      type: object
      description: Implemented with verified Supabase identity in Step 3.
      required: [id, locale, memberships, assignments]
      properties:
        id:
          type: string
          format: uuid
        locale:
          type: string
          enum: [en, bn]
        memberships:
          type: array
          items:
            $ref: '#/components/schemas/ProviderMembership'
        assignments:
          type: array
          items:
            $ref: '#/components/schemas/OutletAssignment'
    UserRole:
      type: string
      enum: [OUTLET_AGENT, PROVIDER_OPERATIONS, PLATFORM_MANAGEMENT, DATA_STEWARD, VALIDATION_AUDITOR, DEMO_ADMIN]
    ProviderMembership:
      type: object
      required: [providerId, role]
      properties:
        providerId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/UserRole'
    OutletAssignment:
      type: object
      required: [areaId, outletId, providerId, role]
      properties:
        areaId:
          type: string
          format: uuid
        outletId:
          type: string
          format: uuid
        providerId:
          type: [string, 'null']
          format: uuid
        role:
          $ref: '#/components/schemas/UserRole'
    OutletHealth:
      type: object
      required: [outletId, forecastRunId, dataQuality, modelConfidence, limitingResource]
      properties:
        outletId: { type: string, format: uuid }
        forecastRunId: { type: string, format: uuid }
        dataQuality: { type: string, enum: [healthy, degraded, unreliable] }
        modelConfidence: { type: number, minimum: 0, maximum: 1 }
        limitingResource: { $ref: '#/components/schemas/LimitingResource' }
        unusualActivity:
          type: array
          items: { $ref: '#/components/schemas/AnomalySignal' }
    OutletBalances:
      type: object
      required: [outletId, sharedCash, providerEMoney]
      properties:
        outletId: { type: string, format: uuid }
        sharedCash: { $ref: '#/components/schemas/ResourceBalance' }
        providerEMoney:
          type: array
          items: { $ref: '#/components/schemas/ProviderResourceBalance' }
    ResourceBalance:
      type: object
      required: [resource, amountMinor]
      properties:
        resource: { type: string, enum: [shared_cash, provider_efloat] }
        amountMinor: { type: string, description: Integer BDT minor units serialized as a string }
    ProviderResourceBalance:
      allOf:
        - $ref: '#/components/schemas/ResourceBalance'
        - type: object
          required: [provider]
          properties:
            provider: { $ref: '#/components/schemas/Provider' }
    LimitingResource:
      type: [object, 'null']
      properties:
        resource: { type: string, enum: [shared_cash, provider_efloat] }
        providerId: { type: [string, 'null'], format: uuid }
    ForecastPoint:
      type: object
      required: [horizonMinutes, projectedLowMinor, projectedMidMinor, projectedHighMinor, riskBand, reserveEtaMinutes, likelyDepletionEtaMinutes]
      properties:
        horizonMinutes: { type: integer, enum: [30, 60, 120, 240] }
        projectedLowMinor: { type: string }
        projectedMidMinor: { type: string }
        projectedHighMinor: { type: string }
        riskBand: { type: string, enum: [low, moderate, high, critical] }
        reserveEtaMinutes: { type: [integer, 'null'] }
        likelyDepletionEtaMinutes: { type: [integer, 'null'] }
    ForecastResource:
      type: object
      required: [resource, providerId, currentMinor, demandRateMinorPerMinute, points]
      properties:
        resource: { type: string, enum: [shared_cash, provider_efloat] }
        providerId: { type: [string, 'null'], format: uuid }
        currentMinor: { type: string }
        demandRateMinorPerMinute: { type: number, minimum: 0 }
        points: { type: array, items: { $ref: '#/components/schemas/ForecastPoint' } }
    ForecastRun:
      type: object
      required: [id, outletId, generatedAt, dataQuality, modelConfidence, limitingResource, resources]
      properties:
        id: { type: string, format: uuid }
        outletId: { type: string, format: uuid }
        generatedAt: { type: string, format: date-time }
        dataQuality: { type: string, enum: [healthy, degraded, unreliable] }
        modelConfidence: { type: number, minimum: 0, maximum: 1 }
        limitingResource: { $ref: '#/components/schemas/LimitingResource' }
        resources: { type: array, items: { $ref: '#/components/schemas/ForecastResource' } }
    AnomalySignal:
      type: object
      required: [id, message, detectorType, detectorVersion, observedValue, baselineValue, threshold, score, sourceTransactionIds, evidenceWindow, possibleBenignExplanation, modelConfidence, dataQuality, provider, correlation]
      properties:
        id: { type: string, format: uuid }
        message: { type: string, const: Unusual activity requires review. }
        detectorType: { type: string, enum: [repeated_amount, abnormal_velocity] }
        detectorVersion: { type: string }
        observedValue: { type: number }
        baselineValue: { type: number }
        threshold: { type: number }
        score: { type: number, minimum: 0, maximum: 1 }
        sourceTransactionIds: { type: array, items: { type: string, format: uuid } }
        evidenceWindow:
          type: object
          required: [start, end]
          properties:
            start: { type: string, format: date-time }
            end: { type: string, format: date-time }
        possibleBenignExplanation: { type: string }
        modelConfidence: { type: number, minimum: 0, maximum: 1 }
        dataQuality: { type: string, enum: [healthy, degraded, unreliable] }
        provider: { $ref: '#/components/schemas/Provider' }
        correlation:
          type: [object, 'null']
          properties:
            score: { type: number, minimum: 0, maximum: 1 }
            threshold: { type: number, minimum: 0, maximum: 1 }
            context: { type: string }
    OutletDataQuality:
      type: object
      required: [outletId, dataQuality, incidents]
      properties:
        outletId: { type: string, format: uuid }
        dataQuality: { type: string, enum: [healthy, degraded, unreliable] }
        incidents:
          type: array
          items:
            type: object
            required: [id, category, details, detectedAt, providerId]
            properties:
              id: { type: string, format: uuid }
              category: { type: string }
              details: { type: object }
              detectedAt: { type: string, format: date-time }
              providerId: { type: [string, 'null'], format: uuid }
    TransactionPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            type: object
            required: [id, provider, amountMinor, type, lifecycle, occurredAt]
            properties:
              id: { type: string, format: uuid }
              provider: { $ref: '#/components/schemas/Provider' }
              amountMinor: { type: string }
              type: { type: string, enum: [CASH_IN, CASH_OUT] }
              lifecycle: { type: string, enum: [PENDING, SETTLED, FAILED, REVERSED] }
              occurredAt: { type: string, format: date-time }
        nextCursor: { type: [string, 'null'], format: uuid }
    AlertType:
      type: string
      enum: [provider_emoney_pressure, shared_cash_pressure, unusual_activity_review, data_quality_issue, combined_review]
    CaseState:
      type: string
      enum: [OPEN, ACKNOWLEDGED, INVESTIGATING, ESCALATED, RESOLVED, CLOSED]
    VersionedCommand:
      type: object
      required: [version]
      properties:
        version: { type: integer, minimum: 1, description: Optimistic case version from the most recent read. }
    CaseAssignment:
      allOf:
        - $ref: '#/components/schemas/VersionedCommand'
        - type: object
          required: [assigneeUserId]
          properties: { assigneeUserId: { type: string, format: uuid } }
    CaseNoteCommand:
      allOf:
        - $ref: '#/components/schemas/VersionedCommand'
        - type: object
          required: [body]
          properties: { body: { type: string, minLength: 1, maxLength: 4000 } }
    SummaryCommand:
      allOf:
        - $ref: '#/components/schemas/VersionedCommand'
        - type: object
          required: [summary]
          properties: { summary: { type: string, minLength: 1, maxLength: 1000 } }
    DispositionCommand:
      allOf:
        - $ref: '#/components/schemas/VersionedCommand'
        - type: object
          required: [disposition]
          properties: { disposition: { type: string, minLength: 1, maxLength: 1000 } }
    ResolveCaseCommand:
      allOf:
        - $ref: '#/components/schemas/VersionedCommand'
        - type: object
          required: [resolutionCode, resolutionSummary]
          properties:
            resolutionCode: { type: string, enum: [VERIFIED_NORMAL_ACTIVITY, DATA_QUALITY_CONFIRMED, ESCALATED_TO_OPERATIONS, NO_FURTHER_REVIEW_REQUIRED] }
            resolutionSummary: { type: string, minLength: 1, maxLength: 2000 }
    Case:
      type: object
      required: [id, outletId, providerId, state, version, ownerUserId, resolutionCode, resolutionSummary, createdBy, createdAt, updatedAt, resolvedAt, closedAt]
      properties:
        id: { type: string, format: uuid }
        outletId: { type: string, format: uuid }
        providerId: { type: [string, 'null'], format: uuid }
        state: { $ref: '#/components/schemas/CaseState' }
        version: { type: integer, minimum: 1 }
        ownerUserId: { type: [string, 'null'], format: uuid }
        resolutionCode: { type: [string, 'null'] }
        resolutionSummary: { type: [string, 'null'] }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        resolvedAt: { type: [string, 'null'], format: date-time }
        closedAt: { type: [string, 'null'], format: date-time }
    CaseTimeline:
      type: object
      required: [caseId, events, notes, auditEvents]
      properties:
        caseId: { type: string, format: uuid }
        events: { type: array, items: { type: object, additionalProperties: true } }
        notes: { type: array, items: { type: object, additionalProperties: true } }
        auditEvents: { type: array, items: { type: object, additionalProperties: true } }
    AlertCaseResponse:
      type: object
      required: [case, alertId]
      properties:
        case: { $ref: '#/components/schemas/Case' }
        alertId: { type: string, format: uuid }
    Alert:
      type: object
      required: [id, outletId, providerId, resource, type, severity, status, active, episodeStartedAt, lastObservedAt, occurrenceCount, message, evidence, dataQuality, modelConfidence, ownerUserId, acknowledgedAt, acknowledgedBy]
      properties:
        id: { type: string, format: uuid }
        outletId: { type: string, format: uuid }
        providerId: { type: [string, 'null'], format: uuid, description: Null for redacted shared-cash and outlet-wide review alerts. }
        resource: { type: [string, 'null'], enum: [shared_cash, provider_efloat, null] }
        type: { $ref: '#/components/schemas/AlertType' }
        severity: { type: string, enum: [low, moderate, high, critical] }
        status: { type: string, enum: [open, acknowledged, assigned, case_created, resolved] }
        active: { type: boolean }
        episodeStartedAt: { type: string, format: date-time }
        lastObservedAt: { type: string, format: date-time }
        occurrenceCount: { type: integer, minimum: 1 }
        message:
          type: object
          required: [key, params]
          properties:
            key: { type: string, enum: [alerts.provider_emoney_pressure.review, alerts.shared_cash_pressure.review, alerts.unusual_activity_review.review, alerts.data_quality_issue.review, alerts.combined_review.review] }
            params: { type: object, additionalProperties: true, description: Localize using English/Bengali client message catalogs; never infer a financial action. }
        evidence: { type: object, additionalProperties: true }
        dataQuality: { type: string, enum: [healthy, degraded, unreliable] }
        modelConfidence: { type: number, minimum: 0, maximum: 1 }
        ownerUserId: { type: [string, 'null'], format: uuid }
        acknowledgedAt: { type: [string, 'null'], format: date-time }
        acknowledgedBy: { type: [string, 'null'], format: uuid }
    AlertDetail:
      allOf:
        - $ref: '#/components/schemas/Alert'
        - type: object
          required: [evidenceSnapshots]
          properties:
            evidenceSnapshots:
              type: array
              items:
                type: object
                required: [kind, observedAt, snapshot]
                properties:
                  kind: { type: string, enum: [forecast, anomaly_signal, data_quality_incident, correlation] }
                  observedAt: { type: string, format: date-time }
                  snapshot: { type: object, additionalProperties: true }
    AlertAssignment:
      type: object
      required: [assigneeUserId]
      properties:
        assigneeUserId: { type: string, format: uuid, description: Must be a recipient derived from alert routing. }

    FeedHealthPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            type: object
            required: [providerId, sequence, receivedAt, qualityStatus, dataQuality, activeIncidentCount, latestIncidentAt]
            properties:
              providerId: { type: string, format: uuid }
              sequence: { type: string }
              receivedAt: { type: string, format: date-time }
              qualityStatus: { type: string, enum: [healthy, degraded] }
              dataQuality: { type: string, enum: [healthy, degraded, unreliable] }
              activeIncidentCount: { type: integer, minimum: 0 }
              latestIncidentAt: { type: [string, 'null'], format: date-time }
        nextCursor: { type: [string, 'null'], format: uuid }
    DataQualityIncidentPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            type: object
            required: [id, providerId, outletId, category, details, detectedAt, resolvedAt]
            properties:
              id: { type: string, format: uuid }
              providerId: { type: [string, 'null'], format: uuid }
              outletId: { type: [string, 'null'], format: uuid }
              category: { type: string }
              details: { type: object, additionalProperties: true }
              detectedAt: { type: string, format: date-time }
              resolvedAt: { type: [string, 'null'], format: date-time }
        nextCursor: { type: [string, 'null'], format: uuid }
    ManagementReadiness:
      type: object
      required: [generatedAt, providersReporting, providersDegraded, providersUnreliable, activeIncidentCount, unresolvedOutletCount, latestFeedReceivedAt]
      properties:
        generatedAt: { type: string, format: date-time }
        providersReporting: { type: integer, minimum: 0 }
        providersDegraded: { type: integer, minimum: 0 }
        providersUnreliable: { type: integer, minimum: 0 }
        activeIncidentCount: { type: integer, minimum: 0 }
        unresolvedOutletCount: { type: integer, minimum: 0 }
        latestFeedReceivedAt: { type: [string, 'null'], format: date-time }
    StandardError:
      type: object
      required: [code, message, fieldErrors, correlationId]
      properties:
        code:
          type: string
        message:
          type: string
        fieldErrors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        correlationId:
          type: string
  responses:
    StandardError:
      description: Standard safe error response. Authentication failures use `MISSING_ACCESS_TOKEN` or `INVALID_ACCESS_TOKEN`; malformed filters use a route-specific `INVALID_*_QUERY`; unauthorized scope is represented without disclosing whether a guessed resource exists.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
          example:
            code: MISSING_ACCESS_TOKEN
            message: A Supabase bearer access token is required.
            fieldErrors: {}
            correlationId: 00000000-0000-4000-8000-000000000001
