openapi: 3.1.0
info:
  title: Prohori API
  version: 0.1.0
  description: |
    Synthetic decision-support API for provider liquidity, unusual activity review,
    data quality, and case coordination. It never performs financial actions.
  license:
    name: UNLICENSED
servers:
  - url: http://localhost:3000/api/v1
paths:
  /health/live:
    get:
      operationId: getLiveHealth
      summary: Check whether API process is live
      security: []
      responses:
        '200':
          description: API is live
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveHealthResponse'
              example:
                service: prohori-api
                status: ok
        '500':
          $ref: '#/components/responses/StandardError'
components:
  headers:
    CorrelationId:
      description: Request correlation identifier. Client-supplied values are echoed when valid.
      schema:
        type: string
        format: uuid
  schemas:
    LiveHealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
          const: prohori-api
        status:
          type: string
          const: ok
    StandardError:
      type: object
      required: [code, message, fieldErrors, correlationId]
      properties:
        code:
          type: string
        message:
          type: string
        fieldErrors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        correlationId:
          type: string
  responses:
    StandardError:
      description: Standard API error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
