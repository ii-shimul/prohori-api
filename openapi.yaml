openapi: 3.1.0
info:
  title: Prohori API
  version: 0.2.0
  description: |
    Synthetic decision-support API for provider liquidity, unusual activity review,
    data quality, and case coordination. It never performs financial actions.
  license:
    name: UNLICENSED
servers:
  - url: http://localhost:3000/api/v1
paths:
  /health/live:
    get:
      operationId: getLiveHealth
      summary: Check whether API process is live
      security: []
      responses:
        '200':
          description: API is live
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveHealthResponse'
              example:
                service: prohori-api
                status: ok
        '500':
          $ref: '#/components/responses/StandardError'
  /me:
    get:
      operationId: getCurrentUser
      summary: Get authenticated profile and authorization scope
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated profile. Implemented in Step 3.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/StandardError'
        '503':
          $ref: '#/components/responses/StandardError'
  /providers:
    get:
      operationId: listProviders
      summary: List synthetic providers available in caller scope
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Providers in caller scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Provider'
        '401':
          $ref: '#/components/responses/StandardError'
        '503':
          $ref: '#/components/responses/StandardError'
  /areas:
    get:
      operationId: listAreas
      summary: List synthetic areas available in caller scope
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Areas in caller scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Area'
        '401':
          $ref: '#/components/responses/StandardError'
        '503':
          $ref: '#/components/responses/StandardError'
  /outlets:
    get:
      operationId: listOutlets
      summary: List synthetic outlets available in caller scope
      security:
        - bearerAuth: []
      parameters:
        - name: areaCode
          in: query
          required: false
          schema:
            type: string
            maxLength: 50
          example: DHAKA_NORTH
      responses:
        '200':
          description: Outlets in caller scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Outlet'
        '401':
          $ref: '#/components/responses/StandardError'
        '503':
          $ref: '#/components/responses/StandardError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  headers:
    CorrelationId:
      description: Request correlation identifier. Client-supplied valid UUID values are echoed.
      schema:
        type: string
        format: uuid
  schemas:
    LiveHealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
          const: prohori-api
        status:
          type: string
          const: ok
    Provider:
      type: object
      required: [id, code, name, status]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          enum: [PROVIDER_A, PROVIDER_B, PROVIDER_C]
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
    Area:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        parentId:
          type: [string, 'null']
          format: uuid
    Outlet:
      type: object
      required: [id, code, name, area, tier, timezone, status]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        area:
          $ref: '#/components/schemas/Area'
        tier:
          type: integer
          minimum: 1
          maximum: 5
        timezone:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
    CurrentUser:
      type: object
      description: Implemented with verified Supabase identity in Step 3.
      required: [id, locale, memberships, assignments]
      properties:
        id:
          type: string
          format: uuid
        locale:
          type: string
          enum: [en, bn]
        memberships:
          type: array
          items:
            type: object
        assignments:
          type: array
          items:
            type: object
    StandardError:
      type: object
      required: [code, message, fieldErrors, correlationId]
      properties:
        code:
          type: string
        message:
          type: string
        fieldErrors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        correlationId:
          type: string
  responses:
    StandardError:
      description: Standard API error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
